<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de todos los Países</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Explorador de Países</h1>
        <div class="search-box">
            <input type="text" id="countryInput" placeholder="Escribe un país en inglés">
            <button id="searchBtn">Buscar</button>
        </div>

        <div id="result" class="result-card">
            <p>Escribe el nombre de un país en inglés para ver su información. Tiene que ser en inglés, si no
                , no funcionará.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>>
